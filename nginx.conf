# ================================================================
#  nginx.conf — Bus Kampus UNHAS v3.1
#  Optimal untuk VPS 512MB RAM / 1 Core
#  Letakkan di: /etc/nginx/sites-available/bus-kampus
#  Aktifkan:    sudo ln -s /etc/nginx/sites-available/bus-kampus /etc/nginx/sites-enabled/
# ================================================================

server {
    listen 80;
    listen [::]:80;
    server_name namadomainanda.com www.namadomainanda.com;

    # Redirect semua HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name namadomainanda.com www.namadomainanda.com;

    # ── SSL (ubah path sesuai sertifikat dari Let's Encrypt) ────────────
    ssl_certificate     /etc/letsencrypt/live/namadomainanda.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/namadomainanda.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Root ke folder public/ Laravel ──────────────────────────────────
    root  /var/www/bus-kampus/public;
    index index.php;

    # ── Keamanan Header ─────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(self)"    always;

    # ── GZIP Compression ────────────────────────────────────────────────
    # Mengompresi JSON response polling & semua aset statis.
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;          # 1-9 (6 = sweet spot kecepatan vs ukuran)
    gzip_min_length   256;        # Jangan compress file < 256 byte
    gzip_proxied      any;
    gzip_buffers      16 8k;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        text/javascript
        text/css
        text/plain
        text/xml
        image/svg+xml
        application/xml
        application/rss+xml
        font/woff
        font/woff2;

    # ── Static Asset Caching (Vite hashed files — permanent cache) ──────
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|ico|webp|png|jpg|jpeg|gif|svg)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;          # Jangan log static files — hemat I/O
        log_not_found off;
    }

    # ── Lightweight Polling API — No Session/Log Overhead ───────────────
    location = /api/poll/buses {
        # Tambahan header khusus untuk JSON API
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header Vary "Accept-Encoding" always;

        # FastCGI ke PHP-FPM
        fastcgi_pass   unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root/index.php;
        include        fastcgi_params;

        # Micro-cache 2 detik di Nginx — jika 100 user poll bersamaan,
        # PHP hanya dieksekusi 1x per 2 detik (bukan 100x).
        fastcgi_cache_valid 200 2s;
    }

    # ── Laravel Default Routing ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Block akses ke file sensitif ────────────────────────────────────
    location ~ /\.(?!well-known).* { deny all; }
    location ~ /\.(env|git|htpasswd) { deny all; }

    # ── PHP-FPM ─────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass            unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;

        # Tuning PHP-FPM untuk VPS kecil
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
        fastcgi_read_timeout    60s;
        fastcgi_connect_timeout 10s;
    }

    error_log  /var/log/nginx/bus-kampus-error.log;
    access_log /var/log/nginx/bus-kampus-access.log;
}
